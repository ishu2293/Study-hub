<!DOCTYPE html>
<html>
<head>
  <title>StudyHub</title>

  <!-- Correct CSS path (relative path) -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Font Awesome Icons -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="dashboard">

  <h1>Welcome back, <span id="username">User</span></h1>
  <p class="subtitle">Ready to continue your learning journey?</p>

  <!-- STATS -->
  <div class="stats">

    <div class="stat-card">
      <p>Total notes</p>
      <h2 id="notesCount">0</h2>
    </div>

    <div class="stat-card">
      <p>Flashcards</p>
      <h2 id="flashCount">0</h2>
    </div>

    <div class="stat-card">
      <p>Revision topics</p>
      <h2 id="revisionCount">8</h2>
    </div>

  </div>

  <!-- QUICK ACCESS -->
  <h2 class="section-title">Quick access</h2>

  <div class="quick-grid">

    <a href="subjects.html" class="quick-card">
      <i class="fa-solid fa-book"></i>
      <div>
        <h3>Subjects</h3>
        <p>Organize your study materials</p>
      </div>
    </a>

    <a href="notes.html" class="quick-card">
      <i class="fa-solid fa-file-lines"></i>
      <div>
        <h3>Notes</h3>
        <p>Create and manage notes</p>
      </div>
    </a>

    <a href="flashcards.html" class="quick-card">
      <i class="fa-solid fa-brain"></i>
      <div>
        <h3>Flashcards</h3>
        <p>Revise with interactive cards</p>
      </div>
    </a>

    <a href="revesion.html" class="quick-card">
      <i class="fa-solid fa-star"></i>
      <div>
        <h3>Revision</h3>
        <p>Track your progress</p>
      </div>
    </a>

  </div>

</div>

</body>
</html>
